<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" font-family="system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="ah4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555" stroke="none"/>
    </marker>
    <marker id="ah4b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888" stroke="none"/>
    </marker>
  </defs>

  <!-- boxes -->
  <rect x="10" y="30" width="70" height="36" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="27" y="53" fill="#1565C0" font-size="12">input</text>

  <rect x="120" y="30" width="100" height="36" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="131" y="53" fill="#E65100" font-size="12">accumulate</text>

  <rect x="260" y="30" width="90" height="36" rx="6" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="268" y="53" fill="#C62828" font-size="12">threshold?</text>

  <rect x="390" y="30" width="60" height="36" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="405" y="53" fill="#2E7D32" font-size="12" font-weight="600">fire!</text>

  <!-- arrows -->
  <line x1="80" y1="48" x2="118" y2="48" stroke="#555" stroke-width="1.5" marker-end="url(#ah4)"/>
  <line x1="220" y1="48" x2="258" y2="48" stroke="#555" stroke-width="1.5" marker-end="url(#ah4)"/>
  <line x1="350" y1="48" x2="388" y2="48" stroke="#555" stroke-width="1.5" marker-end="url(#ah4)"/>

  <!-- propagate label -->
  <text x="455" y="53" fill="#555" font-size="11">→ propagate</text>

  <!-- leak feedback loop -->
  <path d="M420,66 Q420,90 310,90 Q170,90 150,66" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah4b)"/>
  <text x="250" y="88" fill="#888" font-size="10" font-style="italic">leak (decay)</text>
</svg>
