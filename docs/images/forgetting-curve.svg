<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" font-family="system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="ah3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#555" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="60" y1="220" x2="450" y2="220" stroke="#555" stroke-width="1.2" marker-end="url(#ah3)"/>
  <line x1="60" y1="240" x2="60" y2="20" stroke="#555" stroke-width="1.2" marker-end="url(#ah3)"/>

  <!-- Y axis labels -->
  <text x="20" y="50" fill="#555" font-size="11">100%</text>
  <text x="28" y="135" fill="#555" font-size="11">50%</text>
  <text x="28" y="225" fill="#555" font-size="11">0%</text>

  <!-- without review (pure decay) -->
  <path d="M65,45 Q120,80 180,170 Q220,200 400,215"
        fill="none" stroke="#BDBDBD" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="310" y="210" fill="#9E9E9E" font-size="11">without review</text>

  <!-- with spaced review -->
  <path d="M65,45 Q100,70 140,120
           L145,55 Q180,85 220,115
           L225,60 Q270,85 320,105
           L325,65 Q380,85 440,95"
        fill="none" stroke="#2196F3" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- review arrows -->
  <path d="M145,40 L145,50" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#ah3)"/>
  <text x="130" y="37" fill="#4CAF50" font-size="10">R1</text>
  <path d="M225,40 L225,55" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#ah3)"/>
  <text x="210" y="37" fill="#4CAF50" font-size="10">R2</text>
  <path d="M325,40 L325,60" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#ah3)"/>
  <text x="310" y="37" fill="#4CAF50" font-size="10">R3</text>

  <!-- getting flatter annotation -->
  <text x="380" y="85" fill="#2196F3" font-size="11" font-style="italic">flatter</text>

  <!-- labels -->
  <text x="440" y="237" fill="#555" font-size="12">time</text>
  <text x="15" y="30" fill="#555" font-size="12">recall</text>
</svg>
