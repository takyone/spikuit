<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" font-family="system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="ah2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#555" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="50" y1="200" x2="450" y2="200" stroke="#555" stroke-width="1.2" marker-end="url(#ah2)"/>
  <line x1="50" y1="220" x2="50" y2="20" stroke="#555" stroke-width="1.2" marker-end="url(#ah2)"/>

  <!-- threshold line -->
  <line x1="50" y1="90" x2="440" y2="90" stroke="#FF9800" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="442" y="94" fill="#FF9800" font-size="11">threshold</text>

  <!-- pressure curve: rise → decay → rise → decay -->
  <path d="M60,190 L100,70 Q130,100 160,140 L200,55 Q240,90 280,150 L310,80 Q350,120 400,170"
        fill="none" stroke="#7C4DFF" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- neighbor fire arrows -->
  <path d="M100,45 L100,62" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#ah2)"/>
  <text x="75" y="42" fill="#4CAF50" font-size="10">fire</text>
  <path d="M200,30 L200,47" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#ah2)"/>
  <text x="175" y="27" fill="#4CAF50" font-size="10">fire</text>
  <path d="M310,55 L310,72" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#ah2)"/>
  <text x="285" y="52" fill="#4CAF50" font-size="10">fire</text>

  <!-- decay annotation -->
  <text x="340" y="145" fill="#888" font-size="11" font-style="italic">exp decay</text>

  <!-- labels -->
  <text x="440" y="215" fill="#555" font-size="12">time</text>
  <text x="25" y="30" fill="#555" font-size="12">pressure</text>
</svg>
