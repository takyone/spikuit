<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" font-family="system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#555" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="50" y1="140" x2="400" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>
  <line x1="210" y1="260" x2="210" y2="20" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

  <!-- LTP region (positive, left of center = pre before post) -->
  <path d="M210,140 Q210,42 130,58 Q80,68 60,130" fill="none" stroke="#4CAF50" stroke-width="2.5"/>
  <text x="100" y="75" fill="#4CAF50" font-weight="600" font-size="14">LTP (+)</text>

  <!-- LTD region (negative, right of center = post before pre) -->
  <path d="M210,140 Q210,238 290,222 Q340,212 360,150" fill="none" stroke="#E53935" stroke-width="2.5"/>
  <text x="290" y="235" fill="#E53935" font-weight="600" font-size="14">LTD (−)</text>

  <!-- labels -->
  <text x="385" y="133" fill="#555" font-size="12">Δt</text>
  <text x="215" y="30" fill="#555" font-size="12">Δw</text>
  <text x="55" y="155" fill="#888" font-size="11">pre→post</text>
  <text x="310" y="155" fill="#888" font-size="11">post→pre</text>

  <!-- zero line label -->
  <text x="215" y="137" fill="#888" font-size="11">0</text>
</svg>
