site_name: Spikuit
site_description: Neural knowledge graph with spaced repetition
site_url: https://takyone.github.io/spikuit/
repo_url: https://github.com/takyone/spikuit
repo_name: takyone/spikuit

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_javascript:
  - https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js
  - javascripts/charts.js

extra_css:
  - stylesheets/charts.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - tables

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            Getting Started: はじめに
            Concepts: コンセプト
            CLI Reference: CLIリファレンス
            API Reference: APIリファレンス
            Models: モデル
            Circuit: Circuit
            Sessions: セッション
            Embedder: Embedder
            Scaffold & Learn: Scaffold & Learn
            Config: 設定
            Propagation: 伝播
            How to Use: 使い方
            Data: データ
            Engine: エンジン
            Learning: 学習
  - mkdocstrings:
      handlers:
        python:
          paths: [spikuit-core/src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - How to Use: how-to-use.md
  - CLI Reference: cli.md
  - API Reference:
    - reference/index.md
    - Data:
      - Models: reference/models.md
      - Config: reference/config.md
    - Engine:
      - Circuit: reference/circuit.md
      - Propagation: reference/propagation.md
      - Embedder: reference/embedder.md
    - Learning:
      - Scaffold & Learn: reference/scaffold.md
      - Sessions: reference/sessions.md
