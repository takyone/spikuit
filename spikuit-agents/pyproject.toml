[project]
name = "spikuit-agents"
version = "0.6.2"
description = "Strands-based agent workflows for Spikuit"
requires-python = ">=3.11"
dependencies = [
    "spikuit-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spikuit_agents"]
