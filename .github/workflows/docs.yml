name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out amkb-sdk (sibling path the workspace pyproject expects)
        env:
          AMKB_SDK_REV: e7ae4de8ebe86002f55086488dec2ffa0adf8f77
        run: |
          git clone https://github.com/takyone/amkb-sdk.git \
            "${GITHUB_WORKSPACE}/../amkb/amkb-sdk"
          git -C "${GITHUB_WORKSPACE}/../amkb/amkb-sdk" checkout "${AMKB_SDK_REV}"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Build docs
        run: uv run mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
