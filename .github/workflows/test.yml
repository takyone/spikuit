name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly drift run at 04:00 UTC — triggers the amkb-drift job only.
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Run spikuit-core tests
        run: uv run --package spikuit-core pytest spikuit-core/tests/ -q

      - name: Run spikuit-agents adapter tests
        run: uv run --package spikuit-agents pytest spikuit-agents/tests/adapter/ -q

      - name: Run AMKB conformance suite (PR gate — locked SDK)
        run: uv run --package spikuit-agents pytest spikuit-agents/tests/conformance/ -q

  amkb-drift:
    # Nightly drift tier (see docs/design/amkb-adapter-v0.7.1.md §7.6).
    # Resolves amkb fresh within the pinned minor range; failures are
    # informational, not a merge gate.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.11

      - name: Upgrade amkb within the pinned range
        run: uv sync --dev --upgrade-package amkb

      - name: Run conformance against upgraded amkb
        run: uv run --package spikuit-agents pytest spikuit-agents/tests/conformance/ -q
