name: Publish to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.11

      - name: Build spikuit-core
        run: uv build --package spikuit-core --out-dir dist/spikuit-core

      - name: Build spikuit-cli
        run: uv build --package spikuit-cli --out-dir dist/spikuit-cli

      - name: Build spikuit (metapackage)
        run: uv build --package spikuit --out-dir dist/spikuit

      - name: Publish spikuit-core
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/spikuit-core

      - name: Publish spikuit-cli
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/spikuit-cli

      - name: Publish spikuit
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/spikuit

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/spikuit-core/*
            dist/spikuit-cli/*
            dist/spikuit/*
